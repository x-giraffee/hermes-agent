name: Tests

on:
  push:
    branches: [main, ci/readonly-tests-tree-drop-exit4-retry]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        slice: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore duration cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: test_durations.json
          # main always writes a new suffix, but jobs pick the latest one with the same prefix
          # quote from https://docs.github.com/en/actions/reference/workflows-and-actions/dependency-caching#cache-hits-and-misses
          # If you provide restore-keys, the cache action sequentially searches for any caches that match the list of restore-keys.
          # If there are no exact matches, the action searches for partial matches of the restore keys.
          # When the action finds a partial match, the most recent cache is restored to the path directory.
          key: test-durations

      - name: Install ripgrep (prebuilt binary)
        run: |
          set -euo pipefail
          RG_VERSION=15.1.0
          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
          curl -sSfL -o "$RG_TARBALL" \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${RG_TARBALL}"
          echo "${RG_SHA256}  ${RG_TARBALL}" | sha256sum -c -
          tar -xzf "$RG_TARBALL"
          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
          rg --version

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          # Persist uv's download/wheel cache (~/.cache/uv) across runs.
          # Keyed on the dependency manifests, so the cache is reused until
          # pyproject.toml or uv.lock changes. `uv sync` still runs every
          # time, but resolves from the warm cache instead of re-downloading
          # and re-building wheels.
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        # `uv sync --locked` installs the exact pinned set from uv.lock (and
        # fails if the lock is out of sync with pyproject.toml), giving a
        # reproducible env. It also creates .venv itself, so no separate
        # `uv venv` step is needed.
        run: uv sync --locked --python 3.11 --extra all --extra dev

      - name: Minimize uv cache
        # Optimized for CI: prunes pre-built wheels that are cheap to
        # re-download, keeping the persisted cache small and fast to restore.
        run: uv cache prune --ci

      - name: Start pyproject.toml write watchdog
        run: |
          sudo apt-get install -y inotify-tools >/dev/null 2>&1

          # Record initial SHA
          echo "WATCHDOG_INITIAL_SHA=$(sha256sum pyproject.toml | cut -c1-16)" >> $GITHUB_ENV
          echo "Initial pyproject.toml SHA: $(sha256sum pyproject.toml | cut -c1-16)"
          echo "Initial addopts: $(grep addopts pyproject.toml)"

          # Background watcher: inotifywait for event-based detection
          nohup bash -c '
            inotifywait -m -e open -e modify -e close_write -e attrib \
              --format "%T|%e|%w%f" --datefmt "%H:%M:%S.%N" \
              pyproject.toml 2>/dev/null | while IFS="|" read ts event file; do
              SHA=$(sha256sum pyproject.toml | cut -c1-16)
              echo "[$ts] inotify: event=$event sha=$SHA"
              echo "  addopts: $(grep addopts pyproject.toml 2>/dev/null || echo MISSING)"
              echo "  processes with file open:"
              lsof pyproject.toml 2>/dev/null | head -5 || echo "(lsof unavailable)"
              echo "  recent pytest spawns:"
              ps aux | grep -E "pytest.*test_" | grep -v grep | head -5 || echo "(none)"
              echo "  procmap of test runner:"
              ps aux | grep run_tests_parallel | grep -v grep | head -3 || echo "(none)"
              echo "---"
            done
          ' > /tmp/watchdog-inotify.log 2>&1 &
          INOTIFY_PID=$!

          # Background SHA poll loop (check every 0.2s for any change)
          PREV_SHA=$(sha256sum pyproject.toml | cut -c1-16)
          nohup bash -c "
            PREV=$PREV_SHA
            while true; do
              CURR=\$(sha256sum pyproject.toml | cut -c1-16)
              if [ \"\$CURR\" != \"\$PREV\" ]; then
                TS=\$(date -u +%H:%M:%S.%N)
                echo \"[\$TS] ⚠️  SHA CHANGED: \$PREV -> \$CURR\"
                echo \"  new addopts: \$(grep addopts pyproject.toml)\"
                echo \"  git status:\"
                git status --short pyproject.toml
                echo \"  git log (last 3 on HEAD):\"
                git log --oneline -3 2>/dev/null
                echo \"  /proc/self/exe of all python processes:\"
                ls -la /proc/*/exe 2>/dev/null | grep python | head -10
                echo \"  all pytest PIDs and their /proc/PID/cmdline:\"
                for pid in \$(pgrep -f pytest 2>/dev/null); do
                  echo \"    PID \$pid: \$(cat /proc/\$pid/cmdline 2>/dev/null | tr '\\0' ' ')\"
                  echo \"    parent: \$(cat /proc/\$pid/status 2>/dev/null | grep PPid)\"
                  echo \"    cwd: \$(readlink /proc/\$pid/cwd 2>/dev/null)\"
                done
                PREV=\$CURR
              fi
              sleep 0.2
            done
          " > /tmp/watchdog-poll.log 2>&1 &
          POLL_PID=$!

          echo "INOTIFY_PID=$INOTIFY_PID" >> $GITHUB_ENV
          echo "POLL_PID=$POLL_PID" >> $GITHUB_ENV
          echo "Watchdog PIDs: inotify=$INOTIFY_PID poll=$POLL_PID"

      - name: Lock pyproject.toml read-only (catch file-overwriting tests)
        run: |
          chmod 0444 pyproject.toml
          echo "🔒 pyproject.toml locked read-only"
          ls -la pyproject.toml
          echo "SHA: $(sha256sum pyproject.toml | cut -c1-16)"
          echo "addopts: $(grep addopts pyproject.toml)"
          echo ""
          echo "Any test subprocess that tries to write pyproject.toml will now"
          echo "crash with PermissionError and the traceback will identify it."

      - name: Run tests (slice ${{ matrix.slice }}/6)
        # Per-file isolation via scripts/run_tests_parallel.py: discovers
        # every test_*.py file under tests/ (excluding integration/ + e2e/),
        # then runs `python -m pytest <file>` in a freshly-spawned subprocess
        # with bounded parallelism. No xdist, no shared workers, no
        # module-level state leakage between files.
        #
        # Why per-file (not per-test): per-test spawn cost (~250ms × 17k
        # tests = 70min CPU minimum) blew the wall-clock budget. Per-file
        # spawn (~250ms × ~850 files = ~3.5min) fits while still giving
        # every file a fresh interpreter — the only isolation boundary
        # that matters in practice (cross-file leakage was the original
        # flake source; intra-file is the test author's responsibility).
        #
        # Why drop xdist entirely: xdist's persistent workers accumulate
        # state across files, which is exactly the leakage we wanted to
        # fix. ThreadPoolExecutor + subprocess.run is ~60 lines and does
        # the job with cleaner semantics.
        #
        # Matrix slicing (--slice I/N): files are distributed across 6
        # jobs by cached duration (LPT algorithm) so each job gets
        # roughly equal wall time. Without a cache, files default to 2s
        # estimate and get split roughly evenly by count — still correct,
        # just not perfectly balanced.
        run: |
          source .venv/bin/activate
          python scripts/run_tests_parallel.py --slice ${{ matrix.slice }}/6
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

      - name: Check pyproject.toml integrity after tests
        if: always()
        run: |
          echo "🔍 Post-test pyproject.toml check:"
          CURRENT_SHA=$(sha256sum pyproject.toml 2>/dev/null | cut -c1-16 || echo "MISSING")
          INITIAL_SHA="${WATCHDOG_INITIAL_SHA:-unknown}"
          echo "  Initial SHA: $INITIAL_SHA"
          echo "  Current SHA: $CURRENT_SHA"
          if [ "$CURRENT_SHA" != "$INITIAL_SHA" ] && [ "$CURRENT_SHA" != "MISSING" ]; then
            echo "  ⚠️  FILE WAS MODIFIED during test run!"
            echo "  Current addopts: $(grep addopts pyproject.toml 2>/dev/null)"
            echo "  git status:"
            git status --short pyproject.toml
          else
            echo "  ✅ File unchanged"
          fi

          echo ""
          echo "📋 Watchdog inotify log (last 50 lines):"
          tail -50 /tmp/watchdog-inotify.log 2>/dev/null || echo "(no inotify log)"

          echo ""
          echo "📋 Watchdog poll log (last 100 lines):"
          tail -100 /tmp/watchdog-poll.log 2>/dev/null || echo "(no poll log)"

      - name: Upload per-slice durations
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-durations-slice-${{ matrix.slice }}
          path: test_durations.json
          retention-days: 1

  # Merge per-slice duration data into a single cache, so future runs
  # (including PRs) get balanced slicing.
  save-durations:
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download all slice durations
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: test-durations-slice-*
          path: durations
          merge-multiple: true

      - name: Merge into single durations file
        run: |
          python3 -c "
          import json, glob, os
          merged = {}
          for f in glob.glob('durations/*test_durations.json'):
            with open(f) as fh:
              merged.update(json.load(fh))
          with open('test_durations.json', 'w') as fh:
            json.dump(merged, fh, indent=2, sort_keys=True)
          print(f'Merged {len(merged)} file durations')
          "

      - name: Save merged duration cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: test_durations.json
          key: test-durations-${{ github.run_id }}

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ripgrep (prebuilt binary)
        run: |
          set -euo pipefail
          RG_VERSION=15.1.0
          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
          curl -sSfL -o "$RG_TARBALL" \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${RG_TARBALL}"
          echo "${RG_SHA256}  ${RG_TARBALL}" | sha256sum -c -
          tar -xzf "$RG_TARBALL"
          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
          rg --version

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          # Persist uv's download/wheel cache (~/.cache/uv) across runs.
          # Keyed on the dependency manifests, so the cache is reused until
          # pyproject.toml or uv.lock changes. `uv sync` still runs every
          # time, but resolves from the warm cache instead of re-downloading
          # and re-building wheels.
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        # `uv sync --locked` installs the exact pinned set from uv.lock (and
        # fails if the lock is out of sync with pyproject.toml), giving a
        # reproducible env. It also creates .venv itself, so no separate
        # `uv venv` step is needed.
        run: uv sync --locked --python 3.11 --extra all --extra dev

      - name: Minimize uv cache
        # Optimized for CI: prunes pre-built wheels that are cheap to
        # re-download, keeping the persisted cache small and fast to restore.
        run: uv cache prune --ci

      - name: Packaged-wheel i18n smoke test
        run: |
          source .venv/bin/activate
          python -m pytest -m integration tests/test_wheel_locales_e2e.py -v

      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
